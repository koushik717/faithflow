name: faithflow
region: nyc

services:
  - name: api
    dockerfile_path: backend/Dockerfile
    source_dir: /
    github:
      repo: koushik717/faithflow
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 30
    routes:
      - path: /api
        preserve_path_prefix: true
      - path: /hubs
        preserve_path_prefix: true
      - path: /health
        preserve_path_prefix: false
      - path: /swagger
        preserve_path_prefix: true
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
        scope: RUN_TIME
      - key: ASPNETCORE_URLS
        value: http://+:8080
        scope: RUN_TIME
      - key: JwtSettings__Secret
        value: "F7Gait/rWhiXGIQjKMRzSNfnTNajHngG+FwHPHEe5iYiZt4KAoek0dQct1+IPZ3q"
        scope: RUN_TIME
        type: SECRET
      - key: JwtSettings__Issuer
        value: FaithFlowAPI
        scope: RUN_TIME
      - key: JwtSettings__Audience
        value: FaithFlowClients
        scope: RUN_TIME
      - key: JwtSettings__AccessTokenExpirationMinutes
        value: "60"
        scope: RUN_TIME
      - key: JwtSettings__RefreshTokenExpirationDays
        value: "7"
        scope: RUN_TIME
      - key: GoogleAI__ApiKey
        value: "AIzaSyCNfU0vmemQoVbaqSqWxbC9H17ZaZ9noBE"
        scope: RUN_TIME
        type: SECRET
      - key: CorsSettings__Origins
        value: ${APP_URL}
        scope: RUN_TIME

static_sites:
  - name: frontend
    source_dir: frontend
    build_command: npm run build
    output_dir: dist
    routes:
      - path: /
    github:
      repo: koushik717/faithflow
      branch: main
      deploy_on_push: true
    envs:
      - key: VITE_API_URL
        value: ${APP_URL}/api
        scope: BUILD_TIME
      - key: VITE_SIGNALR_URL
        value: ${APP_URL}
        scope: BUILD_TIME
