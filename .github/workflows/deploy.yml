name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Deploy Backend to DigitalOcean App Platform ───────────────
  deploy-backend:
    name: Deploy Backend (DigitalOcean)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger App Platform deployment
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --wait

  # ─── Deploy Frontend to Vercel ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_SIGNALR_URL: ${{ secrets.PRODUCTION_SIGNALR_URL }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
